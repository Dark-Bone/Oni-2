<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Onigiri Prototype</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:sans-serif;
}

#infoBar{
position:absolute;
bottom:10px;
left:10px;
width:80%;
height:80px;
background:rgba(0,0,0,0.6);
padding:10px;
font-size:14px;
overflow:hidden;
}

#attackButton{
position:absolute;
right:20px;
bottom:120px;
width:80px;
height:80px;
background:red;
border-radius:40px;
text-align:center;
line-height:80px;
font-weight:bold;
}

canvas{
background:#1a1a1a;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="infoBar"></div>
<div id="attackButton">ATK</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let infoBar = document.getElementById("infoBar")

function log(text){
infoBar.innerHTML = text + "<br>" + infoBar.innerHTML
}

class Player{
constructor(){
this.x=200
this.y=200
this.hp=100
this.atk=10
this.speed=3
this.inventory={}
}

move(dx,dy){
this.x+=dx*this.speed
this.y+=dy*this.speed
}

attack(enemy){
let damage = this.atk - enemy.def

if(damage < 1) damage = 1

enemy.hp -= damage

log("Hit enemy for "+damage)

if(enemy.hp <= 0){
enemy.die()
}
}
}

class Enemy{
constructor(x,y){
this.x=x
this.y=y
this.hp=30
this.atk=5
this.def=2
}

update(){
let dx = player.x - this.x
let dy = player.y - this.y

let dist = Math.sqrt(dx*dx + dy*dy)

if(dist < 200){
this.x += dx/dist
this.y += dy/dist
}

if(dist < 40){
player.hp -= 0.02
}
}

die(){
log("Enemy defeated")

dropItem()

enemies.splice(enemies.indexOf(this),1)
}
}

let player = new Player()

let enemies = [
new Enemy(500,300),
new Enemy(700,400),
new Enemy(600,200)
]

function dropItem(){

let items = ["Potion","Magatama","Weapon","SkillCard"]

let item = items[Math.floor(Math.random()*items.length)]

player.inventory[item] = (player.inventory[item]||0)+1

log("Obtained "+item)
}

let keys={}

document.addEventListener("keydown",e=>{
keys[e.key]=true
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

document.getElementById("attackButton").onclick=()=>{

enemies.forEach(e=>{

let dx = player.x-e.x
let dy = player.y-e.y

let dist = Math.sqrt(dx*dx+dy*dy)

if(dist<60){
player.attack(e)
}

})

}

function update(){

if(keys["w"]) player.move(0,-1)
if(keys["s"]) player.move(0,1)
if(keys["a"]) player.move(-1,0)
if(keys["d"]) player.move(1,0)

enemies.forEach(e=>e.update())

if(player.hp<=0){
log("You died. Dungeon reset.")
player.hp=100
player.x=200
player.y=200
}

saveGame()
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="blue"
ctx.fillRect(player.x,player.y,30,30)

ctx.fillStyle="red"
enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,30,30)
})

ctx.fillStyle="white"
ctx.fillText("HP: "+Math.floor(player.hp),20,20)

}

function saveGame(){
localStorage.setItem("onigiri_save",JSON.stringify(player.inventory))
}

function loadGame(){

let data = localStorage.getItem("onigiri_save")

if(data){
player.inventory = JSON.parse(data)
log("Save loaded")
}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)
}

loadGame()
loop()

</script>

</body>
</html>
